<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&display=swap');

/* CSS Variables for tone-aware colors */
:root {
  --accent: #D4A520;
  --secondary: #40B8B8;
  --callout-bg: rgba(30, 30, 40, 0.75);
  --text: #E8E0D0;
  --text-dim: #8A8070;
  --bg: #0D0D0F;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  margin: 0 auto;
  font-family: 'Noto Serif SC', 'Source Han Serif SC', serif;
  color: var(--text);
  position: relative;
  background: var(--bg);
}

/* Background texture — native resolution, tile vertically */
.bg-texture {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image: url('{{BG_URL}}');
  background-size: 100% auto;
  background-repeat: repeat-y;
  background-position: center top;
  opacity: 0.45;
  z-index: 0;
}

/* Content layer */
.content {
  position: relative;
  z-index: 10;
  padding: 80px 80px 100px 80px;
}

/* Author header */
.author-header {
  display: flex;
  align-items: center;
  gap: 28px;
  margin-bottom: 60px;
  padding-bottom: 40px;
  border-bottom: 2px solid rgba(212,165,32,0.3);
}
.author-header img {
  width: 130px;
  height: 130px;
  border-radius: 50%;
  border: 3px solid var(--accent);
  object-fit: cover;
}
.author-header .name {
  font-size: 44px;
  font-weight: 700;
  color: var(--text);
}
.author-header .meta {
  font-size: 26px;
  color: var(--text-dim);
  margin-top: 8px;
}
.author-header .tags {
  font-size: 22px;
  color: var(--accent);
  margin-top: 10px;
  letter-spacing: 2px;
}

/* Main title */
.main-title {
  font-size: 80px;
  font-weight: 900;
  color: var(--accent);
  line-height: 1.3;
  margin-bottom: 20px;
  letter-spacing: 4px;
  text-shadow: 0 3px 25px rgba(212,165,32,0.4);
}

/* Subtitle */
.main-subtitle {
  font-size: 44px;
  color: var(--secondary);
  margin-bottom: 60px;
  text-shadow: 0 2px 15px rgba(64,184,184,0.3);
}

/* Section header */
.section-title {
  font-size: 56px;
  font-weight: 900;
  color: var(--accent);
  margin-top: 70px;
  margin-bottom: 35px;
  letter-spacing: 3px;
  text-shadow: 0 2px 20px rgba(212,165,32,0.3);
}

/* Body paragraphs */
.para {
  font-size: 38px;
  line-height: 2.0;
  color: var(--text);
  margin-bottom: 30px;
  text-shadow: 0 2px 10px rgba(0,0,0,0.9);
}

/* Dropcap — first letter styling for first paragraph */
.para.dropcap::first-letter {
  font-size: 128px;
  font-weight: 900;
  float: left;
  line-height: 0.82;
  margin: 8px 16px 0 -4px;
  color: var(--accent);
}

/* Bold/gold inline */
.gold { color: var(--accent); font-weight: 700; }
.teal { color: var(--secondary); font-weight: 700; }

/* Highlight — golden quote */
.highlight {
  font-size: 44px;
  font-weight: 700;
  line-height: 1.6;
  color: var(--text);
  padding: 20px 0 20px 30px;
  border-left: 4px solid var(--accent);
  margin: 40px 0;
  background: rgba(212,165,32,0.06);
  border-radius: 0 8px 8px 0;
}

/* Red callout */
.callout {
  border-left: 6px solid #C0392B;
  padding: 28px 36px;
  margin: 40px 0;
  background: var(--callout-bg);
  border-radius: 0 10px 10px 0;
  font-size: 40px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.75;
}

/* Gold callout */
.callout-gold {
  border-left: 6px solid var(--accent);
  padding: 28px 36px;
  margin: 40px 0;
  background: rgba(40, 35, 20, 0.75);
  border-radius: 0 10px 10px 0;
  font-size: 40px;
  font-weight: 700;
  color: var(--accent);
  line-height: 1.75;
}

/* Divider */
.divider {
  width: 120px;
  height: 3px;
  background: linear-gradient(90deg, var(--accent), transparent);
  margin: 50px 0;
}

/* Embedded images */
.article-image {
  margin: 40px 0;
  text-align: center;
}
.article-image img {
  max-width: 100%;
  border-radius: 10px;
  border: 2px solid rgba(212,165,32,0.3);
}

/* Signature */
.signature {
  margin-top: 80px;
  padding-top: 40px;
  border-top: 2px solid rgba(212,165,32,0.3);
  font-size: 28px;
  color: rgba(212,165,32,0.5);
  letter-spacing: 4px;
}

/* Watermark */
.watermark {
  text-align: right;
  font-size: 22px;
  color: rgba(212,165,32,0.2);
  letter-spacing: 8px;
  margin-top: 40px;
  padding-bottom: 20px;
}
</style>
</head>
<body>
<div class="bg-texture"></div>
<div class="content">
{{CONTENT}}
</div>
</body>
</html>
